name: release-gate

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mac-v0:
    name: Mac V0 release gate
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install Python smoke dependencies
        run: python3 -m pip install requests==2.33.1
      - name: Audit public source surface
        run: script/audit_public_source_surface.sh
      - name: Audit benchmark claims
        run: python3 scripts/audit_benchmark_claims.py
      - name: Validate V0 public scope
        run: script/validate_v0_release_scope.sh
      - name: Native hotkey regression
        run: script/regression_ramblefix_hotkey.sh
      - name: Build native hotkey package
        run: swift build --package-path native/RambleFixHotkey
      - name: Compile Python sources
        run: python3 -m compileall -q src app.py scripts
