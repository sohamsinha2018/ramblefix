name: codeql

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "17 6 * * 1"

jobs:
  analyze:
    name: Analyze
    runs-on: macos-15
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: ["python", "swift"]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
      - name: Build Swift package
        if: matrix.language == 'swift'
        run: swift build --package-path native/RambleFixHotkey
      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
