name: codeql

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "17 6 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze
    runs-on: macos-15
    timeout-minutes: 20
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: python
            build-mode: none
          - language: swift
            build-mode: manual
    steps:
      - uses: actions/checkout@v7
      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
      - name: Build Swift package
        if: matrix.language == 'swift'
        run: swift build --package-path native/RambleFixHotkey
      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
