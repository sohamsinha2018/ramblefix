name: Feature request
description: Suggest a focused improvement for DictaHue.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: job
    attributes:
      label: Job to be done
      description: What are you trying to accomplish with voice dictation?
      placeholder: "Example: I want DictaHue to recover text when I forgot to focus a text field."
    validations:
      required: true
  - type: textarea
    id: current-workaround
    attributes:
      label: Current workaround
      description: What do you do today instead?
  - type: dropdown
    id: priority
    attributes:
      label: Impact
      options:
        - Small polish
        - Saves time every day
        - Blocks me from using DictaHue
    validations:
      required: true
